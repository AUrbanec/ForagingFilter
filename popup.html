<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; font-family: Arial, sans-serif; padding: 15px; margin: 0; }
    h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
    .term-list { list-style: none; padding: 0; margin: 0 0 15px 0; max-height: 200px; overflow-y: auto; }
    .term-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
    .term-item label { display: flex; align-items: center; cursor: pointer; flex-grow: 1;}
    .term-item input[type="checkbox"] { margin-right: 8px; }
    .delete-btn { background: #ff4d4d; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 2px 6px; font-size: 12px; }
    .delete-btn:hover { background: #cc0000; }
    .add-container { display: flex; gap: 5px; }
    input[type="text"] { flex-grow: 1; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
    #addBtn { background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 5px 10px; }
    #addBtn:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h3>Filtered Terms</h3>
  <ul id="termList" class="term-list"></ul>
  <div class="add-container">
    <input type="text" id="newTerm" placeholder="Enter new term...">
    <button id="addBtn">Add</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
